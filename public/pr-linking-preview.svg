    <!-- Tab bar -->
    <rect x="361" y="92" width="839" height="38" fill="#161b22"/>
    <rect x="361" y="130" width="839" height="1" fill="#30363d"/>
    <text x="401" y="116" fill="#8b949e" font-size="12" text-anchor="middle">Code</text>
    <rect x="441" y="92" width="82" height="38" fill="#0d1117"/>
    <text x="482" y="116" fill="#e6edf3" font-size="12" text-anchor="middle">Preview</text>
    <rect x="441" y="129" width="82" height="2" fill="#58a6ff"/>

    <!-- Preview background -->
    <rect x="361" y="131" width="839" height="499" fill="#0d1117"/>

    <!-- Page title row -->
    <text x="430" y="162" fill="#e6edf3" font-size="18" font-weight="700">API Metrics</text>
    <rect x="556" y="149" width="80" height="20" rx="4" fill="#d29922" fill-opacity="0.1" stroke="#d29922" stroke-opacity="0.25" stroke-width="1"/>
    <text x="596" y="163" fill="#d29922" font-size="10" text-anchor="middle">PR #87 · draft</text>
    <rect x="1082" y="148" width="68" height="24" rx="5" fill="none" stroke="#30363d" stroke-width="1"/>
    <text x="1116" y="164" fill="#8b949e" font-size="11" text-anchor="middle">Today &#9660;</text>

    <!-- ── Stat cards row ───────────────────────────────────────────── -->

    <!-- Card 1: Requests -->
    <rect x="430" y="180" width="172" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="446" y="200" fill="#8b949e" font-size="11">Total requests</text>
    <text x="446" y="228" fill="#58a6ff" font-size="22" font-weight="700">12,847</text>
    <text x="446" y="248" fill="#3fb950" font-size="10">&#8593; 12% from yesterday</text>

    <!-- Card 2: Latency -->
    <rect x="614" y="180" width="172" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="630" y="200" fill="#8b949e" font-size="11">Avg latency</text>
    <text x="630" y="228" fill="#e6edf3" font-size="22" font-weight="700">142ms</text>
    <text x="630" y="248" fill="#3fb950" font-size="10">&#8595; 8ms from yesterday</text>

    <!-- Card 3: Errors -->
    <rect x="798" y="180" width="172" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="814" y="200" fill="#8b949e" font-size="11">Errors (24h)</text>
    <text x="814" y="228" fill="#f85149" font-size="22" font-weight="700">23</text>
    <text x="814" y="248" fill="#3fb950" font-size="10">&#8595; 5 from yesterday</text>

    <!-- Card 4: Uptime -->
    <rect x="982" y="180" width="168" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="998" y="200" fill="#8b949e" font-size="11">Uptime</text>
    <text x="998" y="228" fill="#3fb950" font-size="22" font-weight="700">99.9%</text>
    <text x="998" y="248" fill="#8b949e" font-size="10">30-day rolling</text>

    <!-- ── Request volume chart ────────────────────────────────────── -->
    <rect x="430" y="274" width="720" height="140" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
