<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <clipPath id="screen-clip">
      <rect width="1200" height="630" rx="10"/>
    </clipPath>
    <linearGradient id="copilot-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8957e5"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="avatar-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8957e5"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#screen-clip)">

    <!-- Canvas -->
    <rect width="1200" height="630" fill="#0d1117"/>

    <!-- Top nav -->
    <rect width="1200" height="52" fill="#161b22"/>
    <rect y="52" width="1200" height="1" fill="#30363d"/>
    <g transform="translate(20,13)">
      <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z" fill="#e6edf3"/>
    </g>
    <rect x="56" y="20" width="1" height="12" fill="#30363d"/>
    <text x="66" y="31" fill="#e6edf3" font-size="13" font-weight="600">Copilot Blueprint</text>
    <text x="218" y="31" fill="#8b949e" font-size="13">Dashboard</text>
    <text x="298" y="31" fill="#8b949e" font-size="13">Editor</text>
    <!-- User avatar (authenticated) -->
    <circle cx="1162" cy="26" r="14" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="1162" y="31" fill="#8b949e" font-size="11" text-anchor="middle" font-weight="600">CR</text>

    <!-- Editor sub-header -->
    <rect y="53" width="1200" height="38" fill="#161b22"/>
    <rect y="91" width="1200" height="1" fill="#30363d"/>
    <text x="16" y="77" fill="#58a6ff" font-size="12">GitHub</text>
    <text x="63" y="77" fill="#6e7681" font-size="12">&#8250;</text>
    <text x="73" y="77" fill="#58a6ff" font-size="12">Copilot Blueprint</text>
    <text x="176" y="77" fill="#6e7681" font-size="12">&#8250;</text>
    <text x="186" y="77" fill="#e6edf3" font-size="12">New blueprint</text>
    <rect x="1060" y="60" width="120" height="24" rx="5" fill="none" stroke="#3fb950" stroke-width="1"/>
    <text x="1120" y="76" fill="#3fb950" font-size="11" text-anchor="middle">Save blueprint</text>

    <!-- Left panel -->
    <rect x="0" y="92" width="360" height="538" fill="#161b22"/>
    <rect x="360" y="92" width="1" height="538" fill="#30363d"/>

    <!-- Context bar — loaded state with PR chips -->
    <rect x="0" y="92" width="360" height="44" fill="#0d1117"/>
    <rect y="136" width="360" height="1" fill="#30363d"/>
    <!-- Repo chip -->
    <rect x="8" y="108" width="134" height="20" rx="10" fill="#58a6ff" fill-opacity="0.08" stroke="#58a6ff" stroke-opacity="0.2" stroke-width="1"/>
    <text x="75" y="122" fill="#58a6ff" font-size="10" text-anchor="middle">chadradams/api-service</text>
    <!-- Branch chip -->
    <rect x="148" y="108" width="112" height="20" rx="10" fill="#8b949e" fill-opacity="0.1" stroke="#8b949e" stroke-opacity="0.2" stroke-width="1"/>
    <text x="166" y="118" fill="#8b949e" font-size="9">&#8888;</text>
    <text x="204" y="122" fill="#8b949e" font-size="10" text-anchor="middle">feat/metrics-dash</text>
    <!-- PR chip -->
    <rect x="266" y="108" width="58" height="20" rx="10" fill="#d29922" fill-opacity="0.1" stroke="#d29922" stroke-opacity="0.25" stroke-width="1"/>
    <text x="295" y="122" fill="#d29922" font-size="10" text-anchor="middle">PR #87</text>
    <!-- Clear button -->
    <rect x="330" y="111" width="22" height="14" rx="7" fill="#8b949e" fill-opacity="0.12"/>
    <text x="341" y="122" fill="#6e7681" font-size="10" text-anchor="middle">&#10005;</text>

    <!-- Chat header -->
    <rect x="0" y="137" width="360" height="42" fill="#161b22"/>
    <rect y="179" width="360" height="1" fill="#30363d"/>
    <text x="12" y="163" fill="#e6edf3" font-size="13" font-weight="600">Blueprint chat</text>
    <rect x="228" y="147" width="120" height="22" rx="11" fill="#58a6ff" fill-opacity="0.09" stroke="#58a6ff" stroke-opacity="0.22" stroke-width="1"/>
    <rect x="237" y="153" width="10" height="10" rx="2" fill="#58a6ff" fill-opacity="0.7"/>
    <text x="253" y="162" fill="#58a6ff" font-size="10" font-weight="600">UI Wireframe · HTML</text>

    <!-- PR context loaded notification -->
    <rect x="12" y="190" width="336" height="36" rx="6" fill="#d29922" fill-opacity="0.07" stroke="#d29922" stroke-opacity="0.2" stroke-width="1"/>
    <text x="24" y="204" fill="#d29922" font-size="10" font-weight="600">PR #87 context loaded</text>
    <text x="24" y="218" fill="#8b949e" font-size="10">feat/metrics-dash · 6 files changed · +342 -18</text>

    <!-- User message 1 -->
    <rect x="80" y="240" width="268" height="40" rx="10" fill="#1f6feb"/>
    <text x="214" y="257" fill="white" font-size="12" text-anchor="middle">Generate a wireframe for</text>
    <text x="214" y="272" fill="white" font-size="12" text-anchor="middle">the new metrics dashboard</text>
    <text x="340" y="290" fill="#6e7681" font-size="10" text-anchor="end">You</text>

    <!-- Assistant sees PR -->
    <circle cx="22" cy="318" r="12" fill="url(#avatar-grad)"/>
    <text x="22" y="323" fill="white" font-size="9" font-weight="700" text-anchor="middle">Co</text>
    <rect x="42" y="304" width="303" height="52" rx="10" fill="#21262d"/>
    <text x="55" y="320" fill="#8b949e" font-size="11">I can see PR #87 adds 4 new metric</text>
    <text x="55" y="335" fill="#8b949e" font-size="11">cards and a request volume chart.</text>
    <text x="55" y="350" fill="#8b949e" font-size="11">Should I match the existing card style?</text>

    <!-- User reply -->
    <rect x="80" y="370" width="268" height="30" rx="10" fill="#1f6feb"/>
    <text x="214" y="390" fill="white" font-size="12" text-anchor="middle">Yes, use the GitHub Primer tokens</text>

    <!-- Artifact notification -->
    <rect x="42" y="414" width="303" height="54" rx="8" fill="#21262d" stroke="#3fb950" stroke-opacity="0.2" stroke-width="1"/>
    <rect x="42" y="414" width="3" height="54" rx="1" fill="#3fb950"/>
    <rect x="54" y="426" width="20" height="20" rx="4" fill="#3fb950" fill-opacity="0.12"/>
    <text x="64" y="439" fill="#3fb950" font-size="11" text-anchor="middle">&#9670;</text>
    <text x="82" y="432" fill="#e6edf3" font-size="11" font-weight="600">Wireframe generated</text>
    <text x="82" y="447" fill="#8b949e" font-size="10">UI Wireframe · HTML · 87 lines</text>
    <circle cx="328" cy="434" r="8" fill="#3fb950" fill-opacity="0.12"/>
    <text x="328" y="438" fill="#3fb950" font-size="11" text-anchor="middle">&#10003;</text>

    <!-- User refine -->
    <rect x="80" y="482" width="268" height="30" rx="10" fill="#1f6feb"/>
    <text x="214" y="502" fill="white" font-size="12" text-anchor="middle">Add a live requests-per-second gauge</text>

    <!-- Typing indicator -->
    <circle cx="22" cy="535" r="12" fill="url(#avatar-grad)"/>
    <text x="22" y="540" fill="white" font-size="9" font-weight="700" text-anchor="middle">Co</text>
    <rect x="42" y="521" width="80" height="28" rx="8" fill="#21262d"/>
    <circle cx="62" cy="536" r="4" fill="#8b949e"/>
    <circle cx="76" cy="536" r="4" fill="#8b949e" fill-opacity="0.55"/>
    <circle cx="90" cy="536" r="4" fill="#8b949e" fill-opacity="0.25"/>

    <!-- Input bar -->
    <rect x="0" y="575" width="360" height="55" fill="#161b22"/>
    <rect y="575" width="360" height="1" fill="#30363d"/>
    <rect x="10" y="583" width="340" height="38" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="22" y="607" fill="#6e7681" font-size="12">Describe changes to refine…</text>
    <rect x="316" y="589" width="28" height="26" rx="6" fill="url(#copilot-grad)"/>
    <text x="330" y="606" fill="white" font-size="13" text-anchor="middle">&#8593;</text>

