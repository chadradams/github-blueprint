    <text x="1010" y="294" fill="#8b949e" font-size="10" text-anchor="end">Last 24 hours</text>
    <!-- Chart Y-axis labels -->
    <text x="444" y="390" fill="#6e7681" font-size="9" text-anchor="end">2k</text>
    <text x="444" y="355" fill="#6e7681" font-size="9" text-anchor="end">4k</text>
    <text x="444" y="320" fill="#6e7681" font-size="9" text-anchor="end">6k</text>
    <!-- Grid lines -->
    <line x1="450" y1="390" x2="1140" y2="390" stroke="#21262d" stroke-width="1"/>
    <line x1="450" y1="355" x2="1140" y2="355" stroke="#21262d" stroke-width="1"/>
    <line x1="450" y1="320" x2="1140" y2="320" stroke="#21262d" stroke-width="1"/>
    <!-- Area chart shape (filled polygon) -->
    <polygon points="450,390 490,370 540,360 590,350 640,355 690,340 740,325 790,330 840,320 890,328 940,322 990,330 1040,318 1090,325 1140,315 1140,395 450,395" fill="#1f6feb" fill-opacity="0.15"/>
    <!-- Line on top of area -->
    <polyline points="450,390 490,370 540,360 590,350 640,355 690,340 740,325 790,330 840,320 890,328 940,322 990,330 1040,318 1090,325 1140,315" fill="none" stroke="#58a6ff" stroke-width="2"/>
    <!-- X-axis labels -->
    <text x="450" y="405" fill="#6e7681" font-size="9">00:00</text>
    <text x="590" y="405" fill="#6e7681" font-size="9">06:00</text>
    <text x="740" y="405" fill="#6e7681" font-size="9">12:00</text>
    <text x="890" y="405" fill="#6e7681" font-size="9">18:00</text>
    <text x="1100" y="405" fill="#6e7681" font-size="9">now</text>

    <!-- ── Recent requests table ───────────────────────────────────── -->
    <rect x="430" y="428" width="720" height="170" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="446" y="448" fill="#e6edf3" font-size="12" font-weight="600">Recent Requests</text>
    <rect x="431" y="456" width="718" height="1" fill="#30363d"/>
    <!-- Table header -->
    <text x="446" y="471" fill="#6e7681" font-size="10">Method</text>
    <text x="520" y="471" fill="#6e7681" font-size="10">Path</text>
    <text x="780" y="471" fill="#6e7681" font-size="10">Status</text>
    <text x="860" y="471" fill="#6e7681" font-size="10">Duration</text>
    <text x="960" y="471" fill="#6e7681" font-size="10">Time</text>
    <rect x="431" y="477" width="718" height="1" fill="#21262d"/>
    <!-- Row 1 -->
    <rect x="446" y="484" width="36" height="14" rx="3" fill="#238636" fill-opacity="0.2"/>
    <text x="464" y="495" fill="#3fb950" font-size="9" text-anchor="middle">GET</text>
    <text x="520" y="495" fill="#8b949e" font-size="10">/api/blueprints</text>
    <rect x="780" y="484" width="32" height="14" rx="3" fill="#238636" fill-opacity="0.15"/>
    <text x="796" y="495" fill="#3fb950" font-size="9" text-anchor="middle">200</text>
    <text x="860" y="495" fill="#8b949e" font-size="10">48ms</text>
    <text x="960" y="495" fill="#6e7681" font-size="10">just now</text>
    <!-- Row 2 -->
    <rect x="446" y="504" width="38" height="14" rx="3" fill="#1f6feb" fill-opacity="0.2"/>
    <text x="465" y="515" fill="#58a6ff" font-size="9" text-anchor="middle">POST</text>
    <text x="520" y="515" fill="#8b949e" font-size="10">/api/generate</text>
    <rect x="780" y="504" width="32" height="14" rx="3" fill="#238636" fill-opacity="0.15"/>
    <text x="796" y="515" fill="#3fb950" font-size="9" text-anchor="middle">200</text>
    <text x="860" y="515" fill="#8b949e" font-size="10">2,140ms</text>
    <text x="960" y="515" fill="#6e7681" font-size="10">12s ago</text>
    <!-- Row 3 -->
    <rect x="446" y="524" width="36" height="14" rx="3" fill="#238636" fill-opacity="0.2"/>
    <text x="464" y="535" fill="#3fb950" font-size="9" text-anchor="middle">GET</text>
    <text x="520" y="535" fill="#8b949e" font-size="10">/api/github/me</text>
    <rect x="780" y="524" width="32" height="14" rx="3" fill="#238636" fill-opacity="0.15"/>
    <text x="796" y="535" fill="#3fb950" font-size="9" text-anchor="middle">200</text>
    <text x="860" y="535" fill="#8b949e" font-size="10">12ms</text>
    <text x="960" y="535" fill="#6e7681" font-size="10">34s ago</text>
    <!-- Row 4 -->
    <rect x="446" y="544" width="38" height="14" rx="3" fill="#1f6feb" fill-opacity="0.2"/>
    <text x="465" y="555" fill="#58a6ff" font-size="9" text-anchor="middle">POST</text>
    <text x="520" y="555" fill="#8b949e" font-size="10">/api/blueprints</text>
    <rect x="780" y="544" width="32" height="14" rx="3" fill="#238636" fill-opacity="0.15"/>
    <text x="796" y="555" fill="#3fb950" font-size="9" text-anchor="middle">201</text>
    <text x="860" y="555" fill="#8b949e" font-size="10">98ms</text>
    <text x="960" y="555" fill="#6e7681" font-size="10">1m ago</text>
    <!-- Row 5 -->
    <rect x="446" y="564" width="38" height="14" rx="3" fill="#da3633" fill-opacity="0.15"/>
    <text x="465" y="575" fill="#f85149" font-size="9" text-anchor="middle">POST</text>
    <text x="520" y="575" fill="#8b949e" font-size="10">/api/generate</text>
    <rect x="780" y="564" width="32" height="14" rx="3" fill="#da3633" fill-opacity="0.15"/>
    <text x="796" y="575" fill="#f85149" font-size="9" text-anchor="middle">500</text>
    <text x="860" y="575" fill="#8b949e" font-size="10">30,001ms</text>
    <text x="960" y="575" fill="#6e7681" font-size="10">3m ago</text>

    <!-- Panel border -->
    <rect width="1200" height="630" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>
  </g>
</svg>
