<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <clipPath id="screen-clip">
      <rect width="1200" height="630" rx="10"/>
    </clipPath>
    <linearGradient id="copilot-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8957e5"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="avatar-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8957e5"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <marker id="arrowhead" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6e7681"/>
    </marker>
  </defs>

  <g clip-path="url(#screen-clip)">

    <!-- Canvas -->
    <rect width="1200" height="630" fill="#0d1117"/>

    <!-- Top nav -->
    <rect width="1200" height="52" fill="#161b22"/>
    <rect y="52" width="1200" height="1" fill="#30363d"/>
    <g transform="translate(20,13)">
      <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z" fill="#e6edf3"/>
    </g>
    <rect x="56" y="20" width="1" height="12" fill="#30363d"/>
    <text x="66" y="31" fill="#e6edf3" font-size="13" font-weight="600">Copilot Blueprint</text>
    <text x="218" y="31" fill="#8b949e" font-size="13">Dashboard</text>
    <text x="298" y="31" fill="#8b949e" font-size="13">Editor</text>
    <rect x="1058" y="14" width="122" height="26" rx="6" fill="url(#copilot-grad)"/>
    <text x="1119" y="31" fill="white" font-size="12" font-weight="500" text-anchor="middle">Connect GitHub</text>

    <!-- Editor sub-header -->
    <rect y="53" width="1200" height="38" fill="#161b22"/>
    <rect y="91" width="1200" height="1" fill="#30363d"/>
    <text x="16" y="77" fill="#58a6ff" font-size="12">GitHub</text>
    <text x="63" y="77" fill="#6e7681" font-size="12">&#8250;</text>
    <text x="73" y="77" fill="#58a6ff" font-size="12">Copilot Blueprint</text>
    <text x="176" y="77" fill="#6e7681" font-size="12">&#8250;</text>
    <text x="186" y="77" fill="#e6edf3" font-size="12">New blueprint</text>
    <rect x="1060" y="60" width="120" height="24" rx="5" fill="none" stroke="#30363d" stroke-width="1"/>
    <text x="1120" y="76" fill="#3fb950" font-size="11" text-anchor="middle">Save blueprint</text>

    <!-- Left panel -->
    <rect x="0" y="92" width="360" height="538" fill="#161b22"/>
    <rect x="360" y="92" width="1" height="538" fill="#30363d"/>

    <!-- Context bar -->
    <rect x="0" y="92" width="360" height="44" fill="#0d1117"/>
    <rect y="136" width="360" height="1" fill="#30363d"/>
    <text x="12" y="119" fill="#8b949e" font-size="11">Repository context</text>
    <rect x="108" y="108" width="134" height="20" rx="10" fill="#58a6ff" fill-opacity="0.08" stroke="#58a6ff" stroke-opacity="0.2" stroke-width="1"/>
    <text x="175" y="122" fill="#58a6ff" font-size="10" text-anchor="middle">chadradams/api-service</text>

    <!-- Chat header -->
    <rect x="0" y="137" width="360" height="42" fill="#161b22"/>
    <rect y="179" width="360" height="1" fill="#30363d"/>
    <text x="12" y="163" fill="#e6edf3" font-size="13" font-weight="600">Blueprint chat</text>
    <rect x="210" y="147" width="138" height="22" rx="11" fill="#a371f7" fill-opacity="0.09" stroke="#a371f7" stroke-opacity="0.22" stroke-width="1"/>
    <rect x="219" y="153" width="10" height="10" rx="2" fill="#a371f7" fill-opacity="0.7"/>
    <text x="235" y="162" fill="#a371f7" font-size="10" font-weight="600">System Diagram · Mermaid</text>

    <!-- User message 1 -->
    <rect x="80" y="192" width="268" height="40" rx="10" fill="#1f6feb"/>
    <text x="214" y="209" fill="white" font-size="12" text-anchor="middle">Map the API service architecture</text>
    <text x="214" y="224" fill="white" font-size="12" text-anchor="middle">with all Azure integrations</text>
    <text x="340" y="242" fill="#6e7681" font-size="10" text-anchor="end">You</text>

    <!-- Assistant clarify -->
    <circle cx="22" cy="268" r="12" fill="url(#avatar-grad)"/>
    <text x="22" y="273" fill="white" font-size="9" font-weight="700" text-anchor="middle">Co</text>
    <rect x="42" y="254" width="303" height="42" rx="10" fill="#21262d"/>
    <text x="55" y="271" fill="#8b949e" font-size="11">Include GitHub OAuth and the</text>
    <text x="55" y="286" fill="#8b949e" font-size="11">App Insights monitoring path?</text>

    <!-- User reply -->
    <rect x="80" y="310" width="268" height="30" rx="10" fill="#1f6feb"/>
    <text x="214" y="330" fill="white" font-size="12" text-anchor="middle">Yes — show all external services</text>

    <!-- Artifact notification -->
    <rect x="42" y="356" width="303" height="54" rx="8" fill="#21262d" stroke="#a371f7" stroke-opacity="0.2" stroke-width="1"/>
    <rect x="42" y="356" width="3" height="54" rx="1" fill="#a371f7"/>
    <rect x="54" y="368" width="20" height="20" rx="4" fill="#a371f7" fill-opacity="0.12"/>
    <text x="64" y="381" fill="#a371f7" font-size="11" text-anchor="middle">&#11835;</text>
    <text x="82" y="374" fill="#e6edf3" font-size="11" font-weight="600">System diagram generated</text>
    <text x="82" y="389" fill="#8b949e" font-size="10">System Diagram · Mermaid · 28 lines</text>
    <circle cx="328" cy="376" r="8" fill="#a371f7" fill-opacity="0.12"/>
    <text x="328" y="380" fill="#a371f7" font-size="11" text-anchor="middle">&#10003;</text>

    <!-- User refine -->
    <rect x="80" y="424" width="268" height="30" rx="10" fill="#1f6feb"/>
    <text x="214" y="444" fill="white" font-size="12" text-anchor="middle">Add App Insights monitoring node</text>

    <!-- Typing indicator -->
    <circle cx="22" cy="481" r="12" fill="url(#avatar-grad)"/>
    <text x="22" y="486" fill="white" font-size="9" font-weight="700" text-anchor="middle">Co</text>
    <rect x="42" y="467" width="80" height="28" rx="8" fill="#21262d"/>
    <circle cx="62" cy="482" r="4" fill="#8b949e"/>
    <circle cx="76" cy="482" r="4" fill="#8b949e" fill-opacity="0.55"/>
    <circle cx="90" cy="482" r="4" fill="#8b949e" fill-opacity="0.25"/>

    <!-- Input bar -->
    <rect x="0" y="548" width="360" height="82" fill="#161b22"/>
    <rect y="548" width="360" height="1" fill="#30363d"/>
    <rect x="10" y="560" width="340" height="50" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="22" y="590" fill="#6e7681" font-size="12">Describe changes to refine…</text>
    <rect x="316" y="566" width="28" height="28" rx="6" fill="url(#copilot-grad)"/>
    <text x="330" y="584" fill="white" font-size="14" text-anchor="middle">&#8593;</text>

    <!-- ── Right panel ──────────────────────────────────────────────── -->

    <!-- Tab bar -->
    <rect x="361" y="92" width="839" height="38" fill="#161b22"/>
    <rect x="361" y="130" width="839" height="1" fill="#30363d"/>
    <text x="401" y="116" fill="#8b949e" font-size="12" text-anchor="middle">Code</text>
    <rect x="441" y="92" width="82" height="38" fill="#0d1117"/>
    <text x="482" y="116" fill="#e6edf3" font-size="12" text-anchor="middle">Preview</text>
    <rect x="441" y="129" width="82" height="2" fill="#a371f7"/>

    <!-- Preview background -->
    <rect x="361" y="131" width="839" height="499" fill="#0d1117"/>

    <!-- Diagram title -->
    <text x="780" y="165" fill="#e6edf3" font-size="15" font-weight="700" text-anchor="middle">API Service — System Architecture</text>
    <text x="780" y="183" fill="#8b949e" font-size="11" text-anchor="middle">Generated from chadradams/api-service · main</text>

    <!-- ── Architecture nodes ──────────────────────────────────────── -->

    <!-- Node: Browser Client -->
    <rect x="700" y="200" width="160" height="36" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="780" y="223" fill="#e6edf3" font-size="12" font-weight="600" text-anchor="middle">Browser Client</text>

    <!-- Arrow: Browser → App Service (vertical) -->
    <line x1="780" y1="236" x2="780" y2="294" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- Node: Next.js App Service (main, larger) -->
    <rect x="630" y="296" width="300" height="48" rx="6" fill="#21262d" stroke="#a371f7" stroke-width="2"/>
    <text x="780" y="316" fill="#e6edf3" font-size="13" font-weight="700" text-anchor="middle">Next.js App Service</text>
    <text x="780" y="332" fill="#8b949e" font-size="10" text-anchor="middle">Azure App Service · Node 20 LTS</text>

    <!-- Fan-out trunk: App Service → junction -->
    <line x1="780" y1="344" x2="780" y2="378" stroke="#6e7681" stroke-width="1.5"/>
    <!-- Junction horizontal bar -->
    <line x1="533" y1="378" x2="1027" y2="378" stroke="#6e7681" stroke-width="1.5"/>
    <!-- Branch down to OpenAI -->
    <line x1="533" y1="378" x2="533" y2="422" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <!-- Branch down to Cosmos -->
    <line x1="780" y1="378" x2="780" y2="422" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <!-- Branch down to Key Vault -->
    <line x1="1027" y1="378" x2="1027" y2="422" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- Node: Azure OpenAI -->
    <rect x="458" y="424" width="150" height="36" rx="6" fill="#161b22" stroke="#8957e5" stroke-width="1.5"/>
    <text x="533" y="441" fill="#e6edf3" font-size="11" font-weight="600" text-anchor="middle">Azure OpenAI</text>
    <text x="533" y="454" fill="#8b949e" font-size="9" text-anchor="middle">GPT-4o · Blueprint generation</text>

    <!-- Node: Cosmos DB -->
    <rect x="720" y="424" width="120" height="36" rx="6" fill="#161b22" stroke="#1f6feb" stroke-width="1.5"/>
    <text x="780" y="441" fill="#e6edf3" font-size="11" font-weight="600" text-anchor="middle">Cosmos DB</text>
    <text x="780" y="454" fill="#8b949e" font-size="9" text-anchor="middle">Blueprint storage</text>

    <!-- Node: Key Vault -->
    <rect x="952" y="424" width="150" height="36" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="1027" y="441" fill="#e6edf3" font-size="11" font-weight="600" text-anchor="middle">Key Vault</text>
    <text x="1027" y="454" fill="#8b949e" font-size="9" text-anchor="middle">OAuth + JWT secrets</text>

    <!-- Arrow: App Service ← GitHub OAuth (side connection) -->
    <rect x="430" y="308" width="116" height="32" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="488" y="328" fill="#8b949e" font-size="10" text-anchor="middle">GitHub OAuth</text>
    <line x1="546" y1="324" x2="630" y2="320" stroke="#6e7681" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowhead)"/>

    <!-- App Insights (bottom, dotted monitoring line) -->
    <rect x="700" y="502" width="160" height="34" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="780" y="524" fill="#8b949e" font-size="11" text-anchor="middle">App Insights</text>
    <line x1="910" y1="320" x2="950" y2="320" stroke="#6e7681" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="950" y1="320" x2="950" y2="519" stroke="#6e7681" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="950" y1="519" x2="860" y2="519" stroke="#6e7681" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowhead)"/>

    <!-- Legend -->
    <text x="400" y="582" fill="#6e7681" font-size="10">&#9472;&#9472; direct dependency</text>
    <line x1="390" y1="578" x2="406" y2="578" stroke="#6e7681" stroke-width="1.5"/>
    <text x="560" y="582" fill="#6e7681" font-size="10">- - - monitoring / auth flow</text>
    <line x1="550" y1="578" x2="566" y2="578" stroke="#6e7681" stroke-width="1" stroke-dasharray="4 3"/>

    <!-- Panel border -->
    <rect width="1200" height="630" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>
  </g>
</svg>
