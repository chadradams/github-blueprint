    <text x="22" y="500" fill="white" font-size="9" font-weight="700" text-anchor="middle">Co</text>
    <rect x="42" y="481" width="80" height="28" rx="8" fill="#21262d"/>
    <circle cx="62" cy="496" r="4" fill="#8b949e"/>
    <circle cx="76" cy="496" r="4" fill="#8b949e" fill-opacity="0.55"/>
    <circle cx="90" cy="496" r="4" fill="#8b949e" fill-opacity="0.25"/>

