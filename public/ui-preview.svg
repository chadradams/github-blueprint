    </text>
    <text x="418" y="350" font-size="12" font-family="monospace">
      <tspan fill="#8b949e">    }</tspan>
    </text>
    <text x="418" y="368" font-size="12" font-family="monospace">
      <tspan fill="#8b949e">    </tspan><tspan fill="#ff7b72">.section</tspan><tspan fill="#8b949e"> {</tspan>
