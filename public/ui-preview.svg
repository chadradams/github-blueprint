    <rect y="548" width="360" height="1" fill="#30363d"/>
    <rect x="10" y="560" width="340" height="50" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="22" y="590" fill="#6e7681" font-size="12">Describe changes to refine…</text>
    <rect x="316" y="566" width="28" height="28" rx="6" fill="url(#copilot-grad)"/>
    <text x="330" y="584" fill="white" font-size="14" text-anchor="middle">&#8593;</text>

    <!-- ── Right panel ─────────────────────────────────────────────────── -->

    <!-- Tab bar -->
    <rect x="361" y="92" width="839" height="38" fill="#161b22"/>
    <rect x="361" y="130" width="839" height="1" fill="#30363d"/>
    <!-- Code tab (inactive) -->
    <text x="401" y="116" fill="#8b949e" font-size="12" text-anchor="middle">Code</text>
    <!-- Preview tab (active) -->
    <rect x="441" y="92" width="82" height="38" fill="#0d1117"/>
    <text x="482" y="116" fill="#e6edf3" font-size="12" text-anchor="middle">Preview</text>
    <rect x="441" y="129" width="82" height="2" fill="#58a6ff"/>

    <!-- ── Rendered preview (settings page wireframe) ─────────────────── -->
    <rect x="361" y="131" width="839" height="499" fill="#0d1117"/>

    <!-- Page title -->
    <text x="430" y="163" fill="#e6edf3" font-size="19" font-weight="700">Settings</text>
    <text x="430" y="181" fill="#8b949e" font-size="11">Manage your account settings and preferences.</text>
    <rect x="430" y="190" width="730" height="1" fill="#30363d"/>

    <!-- ── General card ───────────────────────────────────────────────── -->
    <rect x="430" y="200" width="730" height="152" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <!-- card header -->
    <text x="450" y="220" fill="#e6edf3" font-size="13" font-weight="600">General</text>
    <text x="450" y="235" fill="#8b949e" font-size="11">Update your display name and email address.</text>
    <rect x="431" y="244" width="728" height="1" fill="#30363d"/>
    <!-- Display name row -->
    <text x="450" y="265" fill="#8b949e" font-size="11">Display name</text>
    <rect x="610" y="252" width="520" height="24" rx="5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="622" y="269" fill="#6e7681" font-size="11">chadradams</text>
    <!-- Email row -->
    <text x="450" y="297" fill="#8b949e" font-size="11">Email address</text>
    <rect x="610" y="284" width="520" height="24" rx="5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="622" y="301" fill="#6e7681" font-size="11">chad@example.com</text>
    <!-- Save button -->
    <rect x="1062" y="316" width="88" height="26" rx="5" fill="#238636"/>
    <text x="1106" y="333" fill="white" font-size="11" font-weight="500" text-anchor="middle">Save changes</text>

    <!-- ── API Keys card ──────────────────────────────────────────────── -->
    <rect x="430" y="366" width="730" height="68" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="450" y="385" fill="#e6edf3" font-size="13" font-weight="600">API Keys</text>
    <rect x="431" y="393" width="728" height="1" fill="#30363d"/>
    <!-- Key row -->
    <rect x="450" y="401" width="20" height="20" rx="3" fill="#8b949e" fill-opacity="0.12"/>
    <text x="460" y="414" fill="#8b949e" font-size="10" text-anchor="middle">&#128273;</text>
    <text x="478" y="414" fill="#8b949e" font-size="11" font-family="monospace">sk-&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;</text>
    <rect x="1022" y="401" width="70" height="22" rx="4" fill="none" stroke="#30363d" stroke-width="1"/>
    <text x="1057" y="416" fill="#8b949e" font-size="11" text-anchor="middle">Regenerate</text>
    <rect x="1098" y="401" width="52" height="22" rx="4" fill="none" stroke="#f85149" stroke-opacity="0.5" stroke-width="1"/>
    <text x="1124" y="416" fill="#f85149" font-size="11" text-anchor="middle">Revoke</text>

    <!-- ── Danger Zone card ───────────────────────────────────────────── -->
    <rect x="430" y="448" width="730" height="72" rx="8" fill="#161b22" stroke="#f85149" stroke-opacity="0.35" stroke-width="1"/>
    <!-- red left accent -->
    <rect x="430" y="448" width="3" height="72" rx="1" fill="#f85149" fill-opacity="0.7"/>
    <text x="452" y="467" fill="#f85149" font-size="11" font-weight="600">&#9888; Danger Zone</text>
    <rect x="431" y="473" width="728" height="1" fill="#f85149" fill-opacity="0.15"/>
    <!-- delete row -->
    <text x="452" y="493" fill="#e6edf3" font-size="11" font-weight="500">Delete this account</text>
    <text x="452" y="507" fill="#8b949e" font-size="10">Permanently removes your account and all associated data. This cannot be undone.</text>
    <rect x="1054" y="480" width="96" height="26" rx="5" fill="#b91c1c"/>
    <text x="1102" y="497" fill="white" font-size="11" font-weight="500" text-anchor="middle">Delete account</text>

    <!-- Panel border -->
    <rect width="1200" height="630" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>
  </g>
</svg>
