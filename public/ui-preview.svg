      <tspan fill="#8b949e">&lt;</tspan><tspan fill="#7ee787">html</tspan><tspan fill="#8b949e"> </tspan><tspan fill="#79c0ff">lang</tspan><tspan fill="#8b949e">=</tspan><tspan fill="#a5d6ff">"en"</tspan><tspan fill="#8b949e">&gt;</tspan>
